services:
  - type: web
    name: sentinel-ai-backend
    runtime: python
    repo: https://github.com/Shlolk/sentinel-AI
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    workDir: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.0

  - type: web
    name: sentinel-ai-frontend
    runtime: static
    repo: https://github.com/Shlolk/sentinel-AI
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://sentinel-ai-backend.onrender.com

databases:
  - name: sentinel-db
    plan: free
    region: oregon
    databaseName: sentinal_ai
    ipAllowList: []
